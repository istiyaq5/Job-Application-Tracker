<!doctype html>
<html
  data-theme="
business"
  lang="en"
>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Job Application Tracker</title>
    <!-- DaisyUI + Tailwind -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@4.10.2/dist/full.min.css"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-gray-100 min-h-screen">
    <div class="max-w-6xl mx-auto px-6 py-10">
      <!-- ================= DASHBOARD ================= -->
      <h1 class="text-3xl font-bold text-blue-700 mb-8">
        Job Application Tracker
      </h1>
     <!-- ========= TotalCount Start ========== -->
      <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-12">
        <div class="bg-white rounded-lg p-6 shadow-xl">
          <p class="text-sm text-gray-500">Total</p>
          <h2 id="totalCount" class="text-2xl font-bold text-blue-700">8</h2>
        </div>

        <div class="bg-white rounded-lg p-6 shadow-xl">
          <p class="text-sm text-gray-500">Interview</p>
          <h2 id="interviewCount" class="text-2xl font-bold text-green-600">
            0
          </h2>
        </div>

        <div class="bg-white rounded-lg p-6 shadow-xl">
          <p class="text-sm text-gray-500">Rejected</p>
          <h2 id="rejectedCount" class="text-2xl font-bold text-red-600">0</h2>
        </div>
      </div>
      <!-- END -->
    </div>
  </body>
</html>
